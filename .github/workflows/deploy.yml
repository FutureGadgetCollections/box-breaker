name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      - name: Set version
        run: echo "HUGO_PARAMS_VERSION=$(git describe --tags --always 2>/dev/null || git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build
        run: hugo --minify --baseURL "https://futuregadgetcollections.github.io/box-breaker/"
        env:
          HUGO_PARAMS_BACKENDURL: ${{ vars.HUGO_PARAMS_BACKENDURL }}
          HUGO_PARAMS_GCS_DATA_BUCKET: ${{ vars.HUGO_PARAMS_GCS_DATA_BUCKET }}
          HUGO_PARAMS_GITHUB_DATA_REPO: ${{ vars.HUGO_PARAMS_GITHUB_DATA_REPO }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
